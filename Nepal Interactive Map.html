            { n: 'Khaptad National Park', c: [29.3167, 80.9500], area: 225,
                desc: 'Khaptad National Park is a middle‑mountain park named after the Hindu sage Khaptad Baba. It is a sacred site with the Khaptad Lake and the Khaptad Danda, a plateau at 3,300m. The park is rich in medicinal plants and supports diverse wildlife, including the Himalayan black bear and musk deer. It is a popular pilgrimage and trekking destination, with panoramic views of the Seti and Karnali valleys. The park\'s spiritual and natural significance attracts both pilgrims and nature enthusiasts.' },
            { n: 'Makalu Barun National Park', c: [27.9167, 87.1667], area: 2330,
                desc: 'Makalu Barun National Park is a remote wilderness area surrounding Mount Makalu, the fifth‑highest peak in the world. It is a biodiversity hotspot, with forests ranging from tropical to alpine, supporting species like the snow leopard, red panda, and Himalayan tahr. The park offers some of the most challenging and pristine trekking routes in Nepal. Its rugged terrain and lack of infrastructure make it a haven for adventure seekers. The park is also an important catchment area for the Arun and Barun rivers.' },
            { n: 'Shivapuri Nagarjun National Park', c: [27.7667, 85.3333], area: 159,
                desc: 'Shivapuri Nagarjun National Park is a protected watershed near Kathmandu, providing drinking water to the capital. It is a popular day‑trip destination for hikers and birdwatchers, with trails through dense forests. The park is home to the Himalayan black bear, leopard, and numerous bird species. It also holds religious significance, with the Nagarjun hill named after the Buddhist philosopher Nagarjuna. The park\'s proximity to Kathmandu makes it a vital green space for residents.' },
            { n: 'Banke National Park', c: [28.2000, 81.7000], area: 550,

            { n: 'Shuklaphanta National Park', c: [28.8500, 80.2000], area: 305,

            { n: 'Parsa National Park', c: [27.4500, 84.4000], area: 627,

            { n: 'Annapurna Conservation Area', c: [28.5000, 84.0000], area: 7629,
                desc: 'Annapurna Conservation Area is Nepal\'s largest protected area, encompassing the Annapurna range and its surrounding valleys. It is a biodiversity hotspot, with ecosystems ranging from subtropical forests to alpine meadows. The area is a world‑famous trekking destination, with routes like the Annapurna Circuit and Base Camp. It is home to diverse ethnic groups, including the Gurung and Thakali, who practice traditional agriculture and tourism. The conservation area balances development with environmental protection, making it a model for sustainable tourism.' },
            { n: 'Manaslu Conservation Area', c: [28.5000, 84.5000], area: 1663,
                desc: 'Manaslu Conservation Area surrounds Mount Manaslu, the eighth‑highest peak in the world. It is a remote and rugged region, with pristine forests and high‑altitude landscapes. The area is home to the snow leopard, Himalayan tahr, and red panda. It offers challenging trekking routes and a deep cultural experience with the local Tibetan‑Buddhist communities. The conservation area supports community‑based eco‑tourism and sustainable development.' },
            { n: 'Kanchenjunga Conservation Area', c: [27.7000, 87.8000], area: 2035,
                desc: 'Kanchenjunga Conservation Area is located in eastern Nepal, surrounding Mount Kanchenjunga, the third‑highest peak. It is a pristine wilderness with a diverse range of ecosystems and wildlife, including the snow leopard and Himalayan black bear. The area is a trekking paradise, offering spectacular views and a taste of remote Himalayan culture. The conservation area is also home to the Limbu people, who have a rich cultural heritage. It is managed with the participation of local communities, ensuring sustainable use.' },
            { n: 'Gaurishankar Conservation Area', c: [27.9000, 86.2000], area: 2179,
                desc: 'Gaurishankar Conservation Area covers the Rolwaling region and the area around Gaurishankar Peak. It is a high‑altitude landscape with glaciers, alpine meadows, and deep valleys. The area supports the snow leopard, Himalayan tahr, and musk deer. It is a challenging trekking destination, popular among experienced hikers. The conservation area is also culturally significant, with many monasteries and mani walls along the trails.' },
            { n: 'Api Nampa Conservation Area', c: [29.7000, 80.9000], area: 1903,
                desc: 'Api Nampa Conservation Area is a far‑western conservation area, encompassing the peaks of Api and Nampa. It is a pristine region with diverse ecosystems, from subtropical forests to high‑altitude meadows. The area is home to the snow leopard, Himalayan black bear, and blue sheep. It offers remote and unspoiled trekking routes, with breathtaking views. The conservation area is also important for its cultural heritage, with traditional villages and ancient monasteries.' },
            { n: 'Koshi Tappu Wildlife Reserve', c: [26.6500, 87.0000], area: 175,
                desc: 'Koshi Tappu Wildlife Reserve is a Ramsar site and the only wetland reserve in Nepal. It is located on the banks of the Koshi River, a major tributary of the Ganges. The reserve is home to the last remaining population of wild water buffalo in Nepal, along with numerous bird species, including migratory waterfowl. It is a paradise for birdwatchers and nature lovers. The reserve also supports local fishing and agriculture, balancing conservation with community needs.' },
            { n: 'Dhorpatan Hunting Reserve', c: [28.4000, 83.0000], area: 1325,
                desc: 'Dhorpatan Hunting Reserve is Nepal\'s only hunting reserve, established for controlled hunting of blue sheep and other game. It is located in the mid‑western region, with diverse habitats including alpine meadows, coniferous forests, and grasslands. The reserve is also a vital habitat for the snow leopard and Himalayan black bear. It offers trekking and wildlife viewing opportunities, with a focus on sustainable hunting practices. The reserve is managed by the Department of National Parks and Wildlife Conservation.' },
        ];
	

        // ─── LOAD ALL DATA ──────────────────────────────────────────────────
        function loadData() {
            try {
                // Metro
                METRO_SUB_DATA.forEach(d => {
                    const size = getCityIconSize(d.pop);
                    const marker = L.marker(d.c, { icon: mkIcon('🏙️', size) })
                        .bindPopup(popupHTML('🏙️', d.n, 'Metropolitan / Sub‑Metropolitan City', d.desc, d.pop))
                        .addTo(LAYERS.metro.group);
                    registerFeature(marker, { name: d.n, description: d.desc, population: d.pop,
                        layerName: 'Metro / Sub‑Metro', emoji: '🏙️', preset: true, popLabel: '👥 Population' });
                    LAYERS.metro.features.push(marker);
                });

                // Municipalities
                MUNI_DATA.forEach(d => {
                    const size = getCityIconSize(d.pop || 10000);
                    const marker = L.marker(d.c, { icon: mkIcon('🏘️', size) })
                        .bindPopup(popupHTML('🏘️', d.n, 'Municipality', d.desc, d.pop))
                        .addTo(LAYERS.cities.group);
                    registerFeature(marker, { name: d.n, description: d.desc, population: d.pop,
                        layerName: 'Municipality', emoji: '🏘️', preset: true, popLabel: '👥 Population' });
                    LAYERS.cities.features.push(marker);
                });

                // Tourism
                TOURISM_DATA.forEach(d => {
                    const marker = L.marker(d.c, { icon: mkIcon('🏡', 28) })
                        .bindPopup(popupHTML('🏡', d.n, 'Tourism Settlement', d.desc))
                        .addTo(LAYERS.tourism.group);
                    registerFeature(marker, { name: d.n, description: d.desc, layerName: 'Tourism Settlement',
                        emoji: '🏡', preset: true });
                    LAYERS.tourism.features.push(marker);
                });

                // Airports
                AIRPORT_DATA.forEach(d => {
                    let size = 24;
                    if (d.passengers >= 5000) size = 44;
                    else if (d.passengers >= 2000) size = 36;
                    else if (d.passengers >= 500) size = 30;
                    else if (d.passengers >= 200) size = 24;
                    else size = 18;
                    const label = '✈️ Passengers per year';
                    const marker = L.marker(d.c, { icon: mkIcon('✈️', size) })
                        .bindPopup(popupHTML('✈️', d.n, 'Airport', d.desc, d.passengers * 1000, label))
                        .addTo(LAYERS.airports.group);
                    registerFeature(marker, { name: d.n, description: d.desc, population: d.passengers * 1000,
                        popLabel: label, layerName: 'Airport', emoji: '✈️', preset: true });
                    LAYERS.airports.features.push(marker);
                });

                // Heritage
                HERITAGE_DATA.forEach(d => {
                    const marker = L.marker(d.c, { icon: mkIcon('🏛️', 24) })
                        .bindPopup(popupHTML('🏛️', d.n, 'Heritage Site', d.desc))
                        .addTo(LAYERS.heritage.group);
                    registerFeature(marker, { name: d.n, description: d.desc, layerName: 'Heritage Site',
                        emoji: '🏛️', preset: true });
                    LAYERS.heritage.features.push(marker);
                });

                // ─── FIXED: Protected Areas – using L.circle ──────────────
                PARK_DATA.forEach(d => {
                    const style = protectedCircle(d.area);
                    const circle = L.circle(d.c, style)
                        .bindPopup(popupHTML('🌳', d.n, 'Protected Area', d.desc, null, null, d.area, '📐 Area'))
                        .addTo(LAYERS.nationalparks.group);
                    registerFeature(circle, { name: d.n, description: d.desc, area: d.area,
                        layerName: 'Protected Area', emoji: '🌳', preset: true, areaLabel: '📐 Area' });
                    LAYERS.nationalparks.features.push(circle);
                });

                renderLayerPanel();
            } catch (err) {
                console.error('Error loading data:', err);
                alert('Error loading map data. Check console.');
            }
        }

        // ─── RENDER LAYER PANEL ────────────────────────────────────────────
        function renderLayerPanel() {
            const list = document.getElementById('layerList');
            if (!list) return;
            list.innerHTML = '';
            Object.entries(LAYERS).forEach(([key, L]) => {
                const d = document.createElement('div');
                d.className = 'layer-item';
                d.innerHTML = `
              <div class="ldot" style="background:${L.color}"></div>
              <span class="lname">${L.emoji} ${L.name}</span>
              <span class="lcount">${L.features.length}</span>
              <div class="tog ${L.visible?'on':''}" data-key="${key}"></div>`;
                d.querySelector('.tog').addEventListener('click', e => { e.stopPropagation();
                    toggleLayer(key); });
                list.appendChild(d);
            });
        }

        function toggleLayer(key) {
            LAYERS[key].visible = !LAYERS[key].visible;
            if (LAYERS[key].visible) map.addLayer(LAYERS[key].group);
            else map.removeLayer(LAYERS[key].group);
            renderLayerPanel();
        }

        // ─── MAP CLICK HANDLER ──────────────────────────────────────────────
        map.on('click', function(e) {
            if (editMode === 'city') {
                pendingCityLatLng = e.latlng;
                showCityModal();
                return;
            }
            if (editMode === 'airport') {
                const name = prompt('Airport name:');
                if (!name) return;
                const desc = prompt('Description:') || '';
                const pop = parseInt(prompt('Annual passengers (approx):') || '0');
                let size = 24;
                if (pop >= 5000) size = 44;
                else if (pop >= 2000) size = 36;
                else if (pop >= 500) size = 30;
                else if (pop >= 200) size = 24;
                else size = 18;
                const label = '✈️ Passengers per year';
                const marker = L.marker(e.latlng, { icon: mkIcon('✈️', size) }).addTo(LAYERS.airports.group);
                const extra = pop ? ` · ${label} ${pop.toLocaleString()}` : '';
                marker.bindPopup(popupHTML('✈️', name, 'Airport', desc + extra, pop, label));
                const data = { name, description: desc, population: pop, popLabel: label, layerName: 'Airport',
                    emoji: '✈️', preset: false, layer: 'airports' };
                registerFeature(marker, data);
                LAYERS.airports.features.push(marker);
                userFeatures.push(data);
                renderLayerPanel();
                setEditMode(null);
                showFeatureDetails(data);
                return;
            }
            if (editMode === 'protected') {
                addProtectedArea(e.latlng);
                return;
            }
            if (editMode === 'highway' || editMode === 'expressway' || editMode === 'railway') {
                startRoad(editMode, e.latlng);
                return;
            }
            showFeatureDetails(null);
        });

        // ─── KEYBOARD SHORTCUTS ──────────────────────────────────────────────
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && isDrawing) cancelDrawing();
            if (e.key === 'Enter' && isDrawing) finishDrawing();
        });

        // ─── SAVE / LOAD ─────────────────────────────────────────────────────
        function saveData() {
            const data = {
                version: '1.0',
                exportedAt: new Date().toISOString(),
                features: userFeatures.map(f => {
                    const base = {
                        type: f.layer,
                        name: f.name,
                        description: f.description || '',
                        emoji: f.emoji,
                        layerName: f.layerName,
                    };
                    if (f.layer === 'metro' || f.layer === 'cities') {
                        base.cityType = f.cityType || (f.layer === 'metro' ? 'metro' : 'municipality');
                        base.population = f.population || 0;
                        const marker = LAYERS[f.layer].features.find(m => m.featureData === f);
                        if (marker) {
                            const latlng = marker.getLatLng();
                            base.lat = latlng.lat;
                            base.lng = latlng.lng;
                        }
                    } else if (f.layer === 'airports') {
                        base.population = f.population || 0;
                        base.popLabel = f.popLabel || '✈️ Passengers per year';
                        const marker = LAYERS[f.layer].features.find(m => m.featureData === f);
                        if (marker) {
                            const latlng = marker.getLatLng();
                            base.lat = latlng.lat;
                            base.lng = latlng.lng;
                        }
                    } else if (f.layer === 'nationalparks') {
                        base.area = f.area || 0;
                        base.areaLabel = f.areaLabel || '📐 Area';
                        const marker = LAYERS[f.layer].features.find(m => m.featureData === f);
                        if (marker) {
                            const latlng = marker.getLatLng();
                            base.lat = latlng.lat;
                            base.lng = latlng.lng;
                        }
                    } else if (f.layer === 'highways' || f.layer === 'expressways' || f.layer === 'railways') {
                        const marker = LAYERS[f.layer].features.find(m => m.featureData === f);
                        if (marker && marker.getLatLngs) {
                            const pts = marker.getLatLngs();
                            if (Array.isArray(pts) && pts.length) {
                                base.points = pts.map(p => [p.lat, p.lng]);
                            }
                        }
                    }
                    return base;
                })
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nepal_data_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert('✅ Data saved successfully!');
        }

        function loadDataFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.features || !Array.isArray(data.features)) {
                        alert('Invalid file format.');
                        return;
                    }
                    const confirmed = confirm(
                        `This will load ${data.features.length} features. Existing user-added features will be cleared. Continue?`
                        );
                    if (!confirmed) return;

                    clearUserFeatures();

                    let loaded = 0;
                    data.features.forEach(f => {
                        const latlng = f.lat !== undefined && f.lng !== undefined ? L.latLng(f.lat, f.lng) :
                            null;
                        const layerKey = f.type;
                        if (!LAYERS[layerKey]) {
                            console.warn('Unknown layer:', layerKey);
                            return;
                        }
                        if (f.points && Array.isArray(f.points) && f.points.length > 1) {
                            const pts = f.points.map(p => L.latLng(p[0], p[1]));
                            let style = {};
                            if (layerKey === 'highways') style = { color: '#ff6b35', weight: 5 };
                            else if (layerKey === 'expressways') style = { color: '#2563EB', weight: 6 };
                            else if (layerKey === 'railways') style = { color: '#a78bfa', weight: 4,
                                dashArray: '8,4' };
                            const poly = L.polyline(pts, style).addTo(LAYERS[layerKey].group);
                            const dataObj = { name: f.name, description: f.description || '',
                                layerName: f.layerName || LAYERS[layerKey].name, emoji: f.emoji || '🛣️',
                                preset: false, layer: layerKey };
                            poly.bindPopup(popupHTML(dataObj.emoji, dataObj.name, dataObj.layerName, dataObj
                                .description));
                            registerFeature(poly, dataObj);
                            LAYERS[layerKey].features.push(poly);
                            userFeatures.push(dataObj);
                            loaded++;
                            return;
                        }
                        if (!latlng) {
                            console.warn('Missing coordinates for', f.name);
                            return;
                        }
                        let emoji = f.emoji || '📍';
                        let size = currentIconSize;
                        let dataObj = { name: f.name, description: f.description || '', layerName: f.layerName ||
                                LAYERS[layerKey].name, emoji, preset: false, layer: layerKey };
                        if (layerKey === 'metro' || layerKey === 'cities') {
                            dataObj.population = f.population || 0;
                            dataObj.popLabel = '👥 Population';
                            dataObj.cityType = f.cityType || (layerKey === 'metro' ? 'metro' : 'municipality');
                            size = getCityIconSize(dataObj.population);
                            if (layerKey === 'metro') emoji = '🏙️';
                            else emoji = '🏘️';
                            dataObj.emoji = emoji;
                        } else if (layerKey === 'airports') {
                            dataObj.population = f.population || 0;
                            dataObj.popLabel = f.popLabel || '✈️ Passengers per year';
                            size = 24;
                            if (dataObj.population >= 5000) size = 44;
                            else if (dataObj.population >= 2000) size = 36;
                            else if (dataObj.population >= 500) size = 30;
                            else if (dataObj.population >= 200) size = 24;
                            else size = 18;
                            emoji = '✈️';
                            dataObj.emoji = emoji;
                        } else if (layerKey === 'nationalparks') {
                            dataObj.area = f.area || 0;
                            dataObj.areaLabel = f.areaLabel || '📐 Area';
                            emoji = '🌳';
                            dataObj.emoji = emoji;
                            size = 24;
                        }
                        const marker = L.marker(latlng, { icon: mkIcon(emoji, size) }).addTo(LAYERS[layerKey]
                            .group);
                        let extra = '';
                        if (dataObj.population) extra += ` · 👥 Population ${dataObj.population.toLocaleString()}`;
                        if (dataObj.area) extra += ` · 📐 Area ${dataObj.area.toLocaleString()} km²`;
                        marker.bindPopup(popupHTML(emoji, dataObj.name, dataObj.layerName, dataObj.description +
                            extra, dataObj.population, dataObj.popLabel, dataObj.area, dataObj.areaLabel));
                        registerFeature(marker, dataObj);
                        LAYERS[layerKey].features.push(marker);
                        userFeatures.push(dataObj);
                        loaded++;
                    });
                    renderLayerPanel();
                    alert(`✅ Loaded ${loaded} features successfully!`);
                } catch (err) {
                    alert('❌ Failed to load file: ' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function clearUserFeatures() {
            userFeatures.forEach(f => {
                const layerKey = f.layer;
                if (LAYERS[layerKey]) {
                    const toRemove = [];
                    LAYERS[layerKey].features.forEach((item, idx) => {
                        if (item.featureData && item.featureData === f) {
                            item.remove();
                            toRemove.push(idx);
                        }
                    });
                    toRemove.sort((a, b) => b - a).forEach(idx => {
                        LAYERS[layerKey].features.splice(idx, 1);
                    });
                }
            });
            userFeatures = [];
            renderLayerPanel();
        }

        // ─── INIT ────────────────────────────────────────────────────────────
        loadData();
        updateCursor();
        updateHint();

        // Assign IDs to toolbar buttons for highlighting
        document.querySelectorAll('#toolbar button').forEach(b => {
            const txt = b.textContent.trim();
            if (txt.includes('Add City')) b.id = 'btnCity';
            else if (txt.includes('Add Airport')) b.id = 'btnAirport';
            else if (txt.includes('Protected')) b.id = 'btnProtected';
            else if (txt.includes('Highway') && !txt.includes('Express') && !txt.includes('Rail')) b.id =
            'btnHighway';
            else if (txt.includes('Expressway')) b.id = 'btnExpressway';
            else if (txt.includes('Railway')) b.id = 'btnRailway';
            else if (txt.includes('Edit')) b.id = 'btnEdit';
            else if (txt.includes('Delete')) b.id = 'btnDelete';
        });
    </script>
